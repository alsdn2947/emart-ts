<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{--red:#EA002C;--ink:#191F28;--bd:#E5E8EC;--mut:#6B7280;--faint:#9CA3AF}
*{box-sizing:border-box}
body{margin:0;background:#F4F5F7;color:var(--ink);font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px}
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid #D6DAE0;border-radius:8px;padding:7px 10px;background:#fff;color:var(--ink);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(234,0,44,.13)}
button{font-family:inherit;cursor:pointer;border:none;border-radius:8px;font-weight:700;font-size:13px}
.btn-red{background:var(--red);color:#fff;padding:8px 16px}
.btn-dark{background:#20262F;color:#fff;padding:8px 14px}
.btn-line{background:#fff;border:1px solid #D6DAE0;padding:8px 14px}
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:18px}
.sec{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sec::before{content:'';width:3px;height:13px;background:var(--red);border-radius:2px}
table{border-collapse:collapse;width:100%}
th{background:#20262F;color:#fff;font-size:12px;padding:9px 10px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1}
td{font-size:13px;padding:8px 10px;border-bottom:1px solid #EDEFF2;white-space:nowrap}
tr.row:hover td{background:#FFF5F6;cursor:pointer}
tr.xrow td{color:var(--faint);background:#F3F4F6}
.num{font-variant-numeric:tabular-nums}
.lbl{font-size:11px;font-weight:700;color:var(--mut);margin-bottom:3px;display:block}
.chip{padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;display:inline-block}
.tag-ok{background:#DDF5E7;color:#0E7A45;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800}
.tag-no{background:#FDE3E3;color:#A32626;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:780px;max-height:88vh;overflow-y:auto;padding:24px}
.fgrid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px}
.ftit{font-size:12px;font-weight:800;color:var(--red);margin:0 0 8px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#20262F;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:60;max-width:90vw;display:none}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1.05fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:760px){.grid3{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
.tab{background:transparent;padding:10px 14px;font-size:14px;color:var(--mut);border-bottom:2.5px solid transparent;border-radius:0}
.tab.on{color:var(--red);border-bottom-color:var(--red)}
.jcard{border:1px solid var(--bd);border-radius:9px;padding:9px 11px;cursor:pointer}
.jcard:hover{border-color:var(--red)}
</style>

/* ── Firestore 실시간 저장 계층 ── */
async function initStorage(){
  if(FIREBASE_CONFIG.apiKey && typeof firebase!=="undefined"){
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      fdb = firebase.firestore();
      fauth = firebase.auth();
      cloud = true;
      setSync("connecting");
      DB = {stores:[], changes:[], orders:[], exportedAt:"", exportedBy:""};
      fauth.onAuthStateChanged(user=>{
        if(user){ hideLogin(); startRealtime(); }
        else { setSync("local"); showLogin(); }
      });
      return;
    }catch(e){ console.error(e); toast("실시간 연결 실패 — 로컬 모드로 전환합니다"); }
  }
  cloud=false; setSync("local");
  load(); render();
}
function startRealtime(){
  if(rtStarted) return; rtStarted=true;
  setSync("connecting");
  const got={s:false,c:false,o:false};
  const maybe=()=>{ if(got.s&&got.c&&got.o) render(); };
  fdb.collection(COL_STORES).onSnapshot(snap=>{
    DB.stores = snap.docs.map(d=>d.data());
    got.s=true; setSync("on"); maybe();
  }, err=>{ console.error(err); setSync("err"); toast("실시간 서버 연결 오류 — 잠시 후 새로고침 해주세요"); });
  fdb.collection(COL_CHANGES).onSnapshot(snap=>{
    DB.changes = snap.docs.map(d=>d.data());
    got.c=true; maybe();
  }, err=>{ console.error(err); });
  fdb.collection(COL_ORDERS).onSnapshot(snap=>{
    DB.orders = snap.docs.map(d=>d.data());
    got.o=true; maybe();
  }, err=>{ console.error(err); });
  render();
  seedIfEmpty();
}
async function seedIfEmpty(){
  try{
    const snap = await fdb.collection(COL_STORES).limit(1).get();
    if(!snap.empty) return;                       // 이미 서버에 데이터가 있음
    const seed = seedData();
    seed.stores.forEach((s,i)=> s.id = "s"+i);    // 결정적 ID → 동시 초기화에도 중복 없음
    for(let i=0;i<seed.stores.length;i+=400){
      const batch = fdb.batch();
      seed.stores.slice(i,i+400).forEach(s=> batch.set(fdb.collection(COL_STORES).doc(s.id), s));
      await batch.commit();
    }
    const cb = fdb.batch();
    seed.changes.forEach(c=> cb.set(fdb.collection(COL_CHANGES).doc(c.id), c));
    await cb.commit();
    toast("초기 가맹점 "+seed.stores.length+"개점을 실시간 서버에 등록했습니다");
  }catch(e){ console.error("seed",e); }
}

function saveStoreCloud(s){ return fdb.collection(COL_STORES).doc(s.id).set(s); }
function delStoreCloud(id){ return fdb.collection(COL_STORES).doc(id).delete(); }
function saveChangeCloud(c){ return fdb.collection(COL_CHANGES).doc(c.id).set(c); }
function saveOrderCloud(o){ return fdb.collection(COL_ORDERS).doc(o.id).set(o); }
function delOrderCloud(id){ return fdb.collection(COL_ORDERS).doc(id).delete(); }
async function importToCloud(d){
  try{
    let n=0; const stores=d.stores||[];
    for(let i=0;i<stores.length;i+=400){
      const batch=fdb.batch();
      stores.slice(i,i+400).forEach(s=>{ if(!s.id) s.id=uid(); batch.set(fdb.collection(COL_STORES).doc(s.id), s); n++; });
      await batch.commit();
    }
    const cb=fdb.batch();
    (d.changes||[]).forEach(c=>{ if(!c.id) c.id=uid(); cb.set(fdb.collection(COL_CHANGES).doc(c.id), c); });
    await cb.commit();
    toast(n+"개 가맹점을 실시간 서버에 반영했습니다 (팀 전체 공유)");
  }catch(e){ console.error(e); toast("서버 반영 중 오류가 발생했습니다"); }
}

/* ══════════ 집계 ══════════ */
const targets = () => DB.stores.filter(s=>s.memX!=="X");
const sorted = (arr) => [...arr].sort((a,b)=>(a.juris+a.name).localeCompare(b.juris+b.name,"ko"));
function stats(){
  const T = targets();
  const st = Object.fromEntries(STATUSES.map(s=>[s,0]));
  const byJ = Object.fromEntries(JURIS.map(j=>[j,{n:0,done:0}]));
  const prod = {silseon:0,jeongaek:0,giga:0,iptv:0,wifi:0,airec:0,callerid:0};
  const byM = {}; const tel = {KT:0,"LGU+":0}; let move=0,fresh=0;
  for(const s of T){
    if(st[s.status]!==undefined) st[s.status]++;
    if(byJ[s.juris]){byJ[s.juris].n++; if(s.status==="개통완료") byJ[s.juris].done++;}
    if(tel[s.telco]!==undefined) tel[s.telco]++;
    if(s.status==="개통완료"){ const m=(s.openD||"").slice(0,7); if(m) byM[m]=(byM[m]||0)+1; }
  }
  for(const o of (DB.orders||[])){
    if(normOStatus(o.status)!=="개통완료") continue;
    for(const l of (o.lines||[])){
      if(l.gubun==="데이터"){ prod.giga++; if(l.wifi&&l.wifi!=="-") prod.wifi++; continue; }
      if(l.gubun==="IPTV"){ prod.iptv++; continue; }
      if((l.plan||"").includes("실")) prod.silseon++; else prod.jeongaek++;
      if(l.airec==="O"||l.simple==="O") prod.airec++;
      if(l.callerid&&l.callerid!=="-") prod.callerid++;
      if(l.gubun==="번호이동"||l.gubun==="번동") move++; else if(l.gubun==="신규") fresh++;
    }
  }
  return {T,st,byJ,prod,byM,tel,move,fresh,done:st["개통완료"]||0,pend:DB.changes.filter(c=>c.applied!=="Y").length};
}

function addChange(){
  const g = id=>document.getElementById(id).value;
  if(!g("cName").trim()){ toast("거점명을 입력하세요"); return; }
  const c = {id:uid(),regD:new Date().toISOString().slice(0,10),effD:g("cEffD"),juris:g("cJuris"),name:g("cName").trim(),type:g("cType"),effect:g("cEffect"),applied:"N",by:uName(),note:g("cNote")};
  DB.changes.unshift(c);
  if(cloud) saveChangeCloud(c); else persist();
  render(); toast("변동이력이 등록되었습니다"+(cloud?" — 팀원 화면에 반영됨":""));

function markApplied(id){ const c=DB.changes.find(c=>c.id===id); if(c){c.applied="Y"; c.by=c.by||uName(); if(cloud) saveChangeCloud(c); else persist(); render();} }
function findStoreFor(c){
  let s = DB.stores.find(s=>s.juris===c.juris && s.name===c.name);
  if(s) return s;
  s = DB.stores.find(s=>s.name===c.name);
  if(s) return s;
  const cands = DB.stores.filter(s=>s.juris===c.juris && (s.name.includes(c.name)||c.name.includes(s.name)));
  return cands.length===1 ? cands[0] : null;
}
function applyExclude(id){
  const c = DB.changes.find(c=>c.id===id); if(!c) return;
  const s = findStoreFor(c);
  if(!s){ toast(`'${c.juris} ${c.name}' 가맹점이 대장에 없습니다 — 이미 제외된 건이면 '반영완료'만 누르세요`); return; }
  if(s.juris!==c.juris || s.name!==c.name){
    if(!confirm(`정확히 일치하는 거점이 없어 유사 거점을 찾았습니다.\n[${s.juris}] ${s.name} 을(를) X 처리할까요?`)) return;
  }
  s.memX="X"; s.status=""; s.note=(s.note?s.note+" / ":"")+c.type+"("+(c.effD||c.regD)+")";
  s.updatedAt=now(); s.updatedBy=uName();
  c.applied="Y";
  if(cloud){ saveStoreCloud(s); saveChangeCloud(c); } else persist();
  render(); toast(c.name+" → 대상 제외(X) 처리 및 반영 완료");
}

function readOrder(){
  const o=curOrder;
  if(document.getElementById("ocustomer")){ o.customer=oval("ocustomer").trim(); o.manager=oval("omanager").trim(); o.juris=oval("ojuris"); }
  o.status=oval("ostatus")||o.status||"상담중"; o.memo=oval("omemo");
  o.otherCarrier=oval("ocarrier"); o.billReceived=oval("obill")||"N"; o.lineCountConf=oval("olinecnt").trim();
  const map={};
  document.querySelectorAll('#modalHost [data-li]').forEach(el=>{ const i=+el.dataset.li; (map[i]=map[i]||emptyLine())[el.dataset.k]=el.value; });
  const idx=Object.keys(map).map(Number).sort((a,b)=>a-b);
  o.lines = idx.length? idx.map(i=>map[i]) : [emptyLine()];
}
function addOrderLine(){ readOrder(); curOrder.lines.push(emptyLine()); renderOrderModal(); }
function delOrderLine(i){ readOrder(); curOrder.lines.splice(i,1); if(!curOrder.lines.length) curOrder.lines=[emptyLine()]; renderOrderModal(); }
function onGubunChange(i){
  readOrder();
  const ln=curOrder.lines[i]; if(ln){ const op=planOptions(ln.gubun); if(op.indexOf(ln.plan)<0) ln.plan=op[0]||""; }
  renderOrderModal();
}
function genFromCounts(){
  readOrder();
  const tel=Math.max(0,parseInt(oval("ogenTel"),10)||0);
  const net=Math.max(0,parseInt(oval("ogenNet"),10)||0);
  const tv=Math.max(0,parseInt(oval("ogenTv"),10)||0);
  if(tel+net+tv===0){ toast("전화/인터넷/IPTV 회선 수를 입력하세요"); return; }
  const oldPhones=(curOrder.lines||[]).filter(l=>l.gubun!=="데이터"&&l.gubun!=="IPTV");
  const lines=[];
  for(let i=0;i<tel;i++){
    const p=oldPhones[i]||{};
    lines.push(Object.assign(emptyLine(),{
      gubun: p.gubun||"번호이동",
      plan: p.plan||(i===0?"실선":"정액6"),
      hunt: p.hunt||(i===0?"대표":"종속"),
      device: p.device||(i===0?"자급":"590G"),
      airec: p.airec||(i===0?"":"O"),
      origNo: p.origNo||"", mediaNo: p.mediaNo||"", ext: p.ext||"", callerid: p.callerid||"", selfMove: p.selfMove||"", daenap: p.daenap||"", ilsi: p.ilsi||""
    }));
  }
  for(let i=0;i<net;i++) lines.push(Object.assign(emptyLine(),{gubun:"데이터",plan:"보안GigaBiz",wifi:"1EA"}));
  for(let i=0;i<tv;i++) lines.push(Object.assign(emptyLine(),{gubun:"IPTV",plan:"스탠다드"}));
  curOrder.lines=lines;
  curOrder.caseType=(net>0||tv>0)?"인터넷IPTV":"전화만";
  renderOrderModal();
  toast("전화 "+tel+" · 인터넷 "+net+" · IPTV "+tv+" 회선 생성 — 원번호를 입력하세요");
}
function orderFromStore(id){
  const s=(DB.stores||[]).find(x=>x.id===id); if(!s){ toast("거점을 찾지 못했습니다"); return; }
  if(typeof closeEdit==="function") closeEdit();
  go("order");
  curOrder={id:"",customer:s.name||"",manager:s.owner||"",juris:s.juris||JURIS[0],storeId:s.id,caseType:"전화만",otherCarrier:s.telco||"",billReceived:"N",lineCountConf:"",status:"상담중",lines:[emptyLine()],memo:s.addr?("주소: "+s.addr):""};
  renderOrderModal();
}
function findOrderStore(order){
  let s=null;
  if(order.storeId) s=(DB.stores||[]).find(x=>x.id===order.storeId);
  if(!s){
    const cust=(order.customer||"").trim(); if(!cust) return null;
    const ms=(DB.stores||[]).filter(x=>x.name && (cust.includes(x.name)||x.name.includes(cust)));
    ms.sort((a,b)=>(b.name||"").length-(a.name||"").length);
    s=ms[0];
  }
  return (!s || s.memX==="X") ? null : s;
}
function resetStoreOnOrderDelete(order){
  const s=findOrderStore(order); if(!s) return null;
  const cleanNote=(s.note||"").split(" / ").filter(t=>t.indexOf("청약 개통완료 반영")<0).join(" / ").trim();
  const up=Object.assign({},s,{status:"미접촉",openD:"",updatedAt:now(),updatedBy:uName(),note:cleanNote});
  if(cloud) saveStoreCloud(up);
  else { const i=DB.stores.findIndex(x=>x.id===s.id); if(i>-1) DB.stores[i]=up; persist(); }
  return s.name;
}
function syncOrderToStore(order){
  const s=findOrderStore(order);
  if(!s) return null;
  const stv=normOStatus(order.status);
  const up=Object.assign({},s,{status:stv,updatedAt:now(),updatedBy:uName()});
  if(order.otherCarrier) up.telco=order.otherCarrier;
  if(stv==="개통완료"){
    const opens=(order.lines||[]).map(l=>l.openD).filter(Boolean).sort();
    const openD=opens[opens.length-1]||"";
    if(openD) up.openD=openD;
    if((up.note||"").indexOf("청약 개통완료 반영")<0) up.note=(up.note?up.note+" / ":"")+"청약 개통완료 반영"+(openD?"("+openD+")":"");
  }
  if(up.status===s.status && up.telco===s.telco && up.openD===s.openD && up.note===s.note) return s.name;
  if(cloud) saveStoreCloud(up);
  else { const i=DB.stores.findIndex(x=>x.id===s.id); if(i>-1) DB.stores[i]=up; persist(); }
  return s.name;
}
function closeOrder(){ document.getElementById("modalHost").innerHTML=""; curOrder=null; }
function saveOrder(){
  readOrder();
  if(!curOrder.customer){ toast("고객명(거점명)을 입력하세요"); return; }
  curOrder.updatedAt=now(); curOrder.updatedBy=uName();
  if(!curOrder.id){ curOrder.id=uid(); curOrder.createdAt=now(); DB.orders=DB.orders||[]; }
  curOrder.status=normOStatus(curOrder.status);
  if(curOrder.status==="개통완료" && !curOrder.completedAt) curOrder.completedAt=now();
  if(cloud) saveOrderCloud(curOrder);
  else { const i=(DB.orders||[]).findIndex(o=>o.id===curOrder.id); if(i>-1) DB.orders[i]=curOrder; else (DB.orders=DB.orders||[]).push(curOrder); persist(); }
  const stv=curOrder.status;
  const sName=syncOrderToStore(curOrder);
  closeOrder(); render();
  toast("청약이 저장되었습니다"+(sName?" · 가맹점 '"+sName+"' 상태 → "+stv:"")+(cloud?" (팀 공유)":""));
}
function delOrder(){
  if(!curOrder.id) return;
  if(!confirm("이 청약서를 삭제할까요? 연결된 가맹점 상태는 '미접촉'으로 되돌아갑니다.")) return;
  const _id=curOrder.id, _ord=curOrder;
  if(cloud) delOrderCloud(_id); else { DB.orders=(DB.orders||[]).filter(o=>o.id!==_id); persist(); }
  const sName=resetStoreOnOrderDelete(_ord);
  closeOrder(); render();
  toast("삭제되었습니다"+(sName?" · 가맹점 '"+sName+"' 상태 → 미접촉":""));
}
function exportOrderXlsx(){
  if(typeof XLSX==="undefined"){ toast("엑셀 라이브러리를 불러오지 못했습니다 — 인터넷 연결 확인 후 다시 시도하세요"); return; }
  readOrder(); const o=curOrder;
  const n=Math.max(1,(o.lines||[]).length);
  const mgr=(o.manager||"").replace(/^\(|\)$/g,"");
  const custCell=(o.customer||"")+(mgr?"\n\n("+mgr+")":"");
  const aoa=[OH1.slice(),OH2.slice()];
  o.lines.forEach((ln,i)=>aoa.push(OKEYS.map(k=> k==="_cust" ? (i===0?custCell:"") : (ln[k]||"") )));
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!merges"]=OMERGES.concat([{s:{r:2,c:0},e:{r:1+n,c:0}}]);   // A열 고객명 세로 병합 (논현점 양식)
  ws["!cols"]=[]; ws["!cols"][0]={wch:14}; ws["!cols"][2]={wch:12.2}; ws["!cols"][3]={wch:15.9}; ws["!cols"][4]={wch:13}; ws["!cols"][12]={wch:11.6};
  ws["!rows"]=aoa.map(()=>({hpt:17.25}));
  /* 논현점 양식 서식: 헤더 회색(BFBFBF)+굵게, 노란셀(P1 개통일·K2 WIFI·M2 발신번호변경),
     데이터 연녹색(E2EFDA), 전체 medium 테두리, 맑은고딕 10, 가운데 정렬+줄바꿈 */
  const MED={style:"medium",color:{rgb:"000000"}};
  const BORD={top:MED,bottom:MED,left:MED,right:MED};
  const FONT={name:"Malgun Gothic",sz:10,color:{rgb:"1E1E23"}};
  const AL={horizontal:"center",vertical:"center",wrapText:true};
  const S_HEAD={fill:{patternType:"solid",fgColor:{rgb:"BFBFBF"}},font:Object.assign({bold:true},FONT),alignment:AL,border:BORD};
  const S_YEL ={fill:{patternType:"solid",fgColor:{rgb:"FFFF00"}},font:Object.assign({bold:true},FONT),alignment:AL,border:BORD};
  const S_DATA={fill:{patternType:"solid",fgColor:{rgb:"E2EFDA"}},font:FONT,alignment:AL,border:BORD};
  const YEL={"P1":1,"K2":1,"M2":1};
  for(let r=0;r<aoa.length;r++){
    for(let c=0;c<17;c++){
      const ad=XLSX.utils.encode_cell({r:r,c:c});
      if(!ws[ad]) ws[ad]={t:"s",v:""};
      ws[ad].s = r<2 ? (YEL[ad]?S_YEL:S_HEAD) : S_DATA;
    }
  }
  const wb=XLSX.utils.book_new();
  const nm=(o.customer||"청약").replace(/[\/\\:*?\[\]]/g,"").slice(0,20) || "청약";
  XLSX.utils.book_append_sheet(wb, ws, (nm+" 청약요청 메일").slice(0,31));
  XLSX.writeFile(wb, nm+"_청약요청_"+dnow()+".xlsx");
  toast("청약요청 양식(.xlsx)이 저장되었습니다 — 그대로 메일 첨부하세요");
}
/* ── 견적서(.xlsx) — 첨부 견적서 서식 그대로, 노란 셀(수량)만 변경 ──
   매핑: C6 고객명(거점 연결) / F9 견적일자(당일) / N15 실선 / N16 정액6 /
   N17 AI레코딩 / N18 심플CRM(=AI레코딩) / N25 GigaBiz(인터넷) /
   N31 Btv스탠다드(IPTV) / N32 셋톱박스(=IPTV) */
function quoteCounts(){
  const c={sil:0,ja6:0,ai:0,net:0,tv:0};
  (curOrder.lines||[]).forEach(l=>{
    if(l.gubun==="데이터"){c.net++;return;}
    if(l.gubun==="IPTV"){c.tv++;return;}
    if((l.plan||"").includes("실")) c.sil++; else c.ja6++;
    if(l.airec==="O") c.ai++;
  });
  return c;
}
function exportQuoteXlsx(){
  if(typeof XlsxPopulate==="undefined"||!window.QUOTE_TPL_B64){ toast("견적서 라이브러리를 불러오지 못했습니다 — 인터넷 연결 확인 후 다시 시도하세요"); return; }
  readOrder();
  const cust=(curOrder.customer||"").trim()||"고객명";
  const c=quoteCounts();
  /* 전화만 있는 청약 → 인터넷/TV 행이 아예 없는 전용 템플릿 사용
     (견적금액 SUM 범위도 전화 구간만: =SUM(O15:O18))
     데이터/IPTV 행이 있으면 → 전체 템플릿 (SUM에 인터넷·TV 포함) */
  const telOnly = (c.net===0 && c.tv===0);
  const b64 = telOnly ? window.QUOTE_TPL_TEL_B64 : window.QUOTE_TPL_B64;
  const bin=atob(b64);
  const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  XlsxPopulate.fromDataAsync(buf.buffer).then(wb=>{
    const s=wb.sheet(0);
    s.cell("C6").value(cust);
    s.cell("F9").value(dnow());
    s.cell("N15").value(c.sil);
    s.cell("N16").value(c.ja6);
    s.cell("N17").value(c.ai);
    s.cell("N18").value(c.ai);        // 심플CRM = AI레코딩 무료 적용
    if(!telOnly){
      s.cell("N25").value(c.net);
      s.cell("N31").value(c.tv);
      s.cell("N32").value(c.tv);      // 셋톱박스 = IPTV 1:1
    }
    return wb.outputAsync();
  }).then(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=cust+"_견적서_"+dnow()+(telOnly?"_전화":"")+".xlsx";
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),3000);
    toast("견적서(.xlsx) 저장 — "+(telOnly?"전화 전용 양식":"전화+인터넷·TV 양식")+" · 실선 "+c.sil+" · 정액6 "+c.ja6+" · AI레코딩 "+c.ai+(telOnly?"":" · 인터넷 "+c.net+" · IPTV "+c.tv));
  }).catch(e=>{ console.error(e); toast("견적서 생성 중 오류가 발생했습니다"); });
}
function omatchKey(lbl){
  const s=String(lbl||"").replace(/\s/g,"");
  if(!s) return null;
  if(s.includes("고객")) return "_cust";
  if(s.includes("구분")) return "gubun";
  if(s.includes("요금")) return "plan";
  if(s.includes("원번호")) return "origNo";
  if(s.includes("매개")) return "mediaNo";
  if(s.includes("자사")) return "selfMove";
  if(s.includes("내선")) return "ext";
  if(s.includes("단말")) return "device";
  if(s.includes("대납")) return "daenap";
  if(s.includes("일시")) return "ilsi";
  if(s.toUpperCase().includes("WIFI")) return "wifi";
  if(s.includes("AI")||s.includes("레코딩")||s.includes("심플")) return "airec";
  if(s.includes("발신")) return "callerid";
  if(s.includes("헌트")) return "hunt";
  if(s.includes("부가할인")) return "discount";
  if(s.includes("개통")) return "openD";
  if(s.includes("결합")) return "combine";
  return null;
}
function ordersFromWorkbook(wb){
  const out=[];
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn]; if(!ws) return;
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    if(aoa.length<3) return;
    let hr=-1;
    for(let r=0;r<Math.min(aoa.length,6);r++){ const line=(aoa[r]||[]).map(x=>String(x||"")).join("|"); if(line.includes("구분")&&line.includes("요금")){ hr=r; break; } }
    if(hr<0) return;
    const h1=(aoa[hr]||[]).map(x=>String(x||"").trim());
    const h2=(aoa[hr+1]||[]).map(x=>String(x||"").trim());
    const cols=Math.max(h1.length,h2.length);
    const map={};
    for(let c=0;c<cols;c++){ const key=omatchKey(h2[c]||h1[c]); if(key && map[key]===undefined) map[key]=c; }
    if(map.gubun===undefined && map.plan===undefined) return;
    const lines=[]; let customer="",manager="";
    for(let r=hr+2;r<aoa.length;r++){
      const row=aoa[r]||[];
      const gv=String(map.gubun!==undefined?row[map.gubun]:"").trim(), pv=String(map.plan!==undefined?row[map.plan]:"").trim();
      if(!gv && !pv) continue;
      const ln=emptyLine();
      OCOLS.forEach(c=>{ if(map[c.k]!==undefined) ln[c.k]=String(row[map[c.k]]==null?"":row[map[c.k]]).trim(); });
      if(ln.hunt){ if(ln.hunt.includes("대표"))ln.hunt="대표"; else if(ln.hunt.includes("링")||ln.hunt.includes("종속"))ln.hunt="종속"; }
      if(ln.plan){ if(ln.plan.includes("정액"))ln.plan="정액6"; else if(ln.plan.includes("실"))ln.plan="실선"; }
      lines.push(ln);
      if(map._cust!==undefined){ const cv=String(row[map._cust]==null?"":row[map._cust]).trim(); if(cv){ if(!customer)customer=cv; else if(!manager && cv!==customer) manager=cv; } }
    }
    if(!customer) customer = sn.replace(/청약\s*(완료|요청)?\s*메일?/g,"").trim() || sn;
    if(lines.length) out.push({customer,manager,lines});
  });
  return out;
}
function importCompletion(file){
  if(typeof XLSX==="undefined"){ toast("엑셀 라이브러리를 불러오지 못했습니다 — 인터넷 연결 확인 후 다시 시도하세요"); return; }
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const parsed=ordersFromWorkbook(wb);
      if(!parsed.length){ toast("청약 데이터를 찾지 못했습니다 — 양식(구분·요금제·원번호 헤더)을 확인하세요"); return; }
      let up=0,cr=0; const stU=[];
      parsed.forEach(p=>{
        const origs=new Set(p.lines.map(l=>l.origNo).filter(x=>x&&x!=="-"));
        let ord=(DB.orders||[]).find(o=>o.customer&&p.customer&&(o.customer.includes(p.customer)||p.customer.includes(o.customer)));
        if(!ord) ord=(DB.orders||[]).find(o=>(o.lines||[]).some(l=>l.origNo&&origs.has(l.origNo)));
        let saved;
        if(ord){
          saved=Object.assign({},ord,{lines:p.lines,status:"개통완료",completedAt:now(),updatedAt:now(),updatedBy:uName(),manager:ord.manager||p.manager,customer:ord.customer||p.customer});
          if(cloud) saveOrderCloud(saved); else { const i=DB.orders.findIndex(o=>o.id===ord.id); DB.orders[i]=saved; persist(); }
          up++;
        } else {
          saved={id:uid(),customer:p.customer,manager:p.manager,juris:"",storeId:"",caseType:"전화만",otherCarrier:"",billReceived:"Y",lineCountConf:"",status:"개통완료",lines:p.lines,memo:"",createdAt:now(),completedAt:now(),updatedAt:now(),updatedBy:uName()};
          DB.orders=DB.orders||[]; if(cloud) saveOrderCloud(saved); else { DB.orders.push(saved); persist(); }
          cr++;
        }
        const sn=syncOrderToStore(saved); if(sn) stU.push(sn);
      });
      tab="order"; render();
      toast("청약완료 반영 — 업데이트 "+up+" · 신규 "+cr+(stU.length?" · 대장 개통완료 "+stU.length+"곳("+stU.slice(0,3).join(",")+(stU.length>3?"…":"")+")":""));
    }catch(err){ console.error(err); toast("엑셀을 읽을 수 없습니다 — .xlsx 파일인지 확인하세요"); }
  };
  rd.readAsArrayBuffer(file);
}

let cur = null;
function openEdit(id){
  cur = id ? {...DB.stores.find(s=>s.id===id)} : {id:"",juris:JURIS[0],code:"",name:"",sido:"",addr:"",owner:"",phone:"",bizNo:"",vtype:"승용",memX:"",memo:"",...OPS};
  cur.salesMgr=cur.salesMgr||""; cur.installMgr=cur.installMgr||cur.tech||"";   // 구버전 설치기사 → 설치담당자로 승계
  const fi = (l,k,t="text",w="") => `<div style="${w?`width:${w}px;flex:none`:"flex:1 1 140px"};min-width:105px"><span class="lbl">${l}</span><input type="${t}" data-k="${k}" value="${esc(cur[k])}" style="width:100%"></div>`;
  const fs = (l,k,opts,w) => `<div style="width:${w}px;flex:none;min-width:90px"><span class="lbl">${l}</span><select data-k="${k}" style="width:100%"><option value=""></option>${opts.map(o=>`<option ${cur[k]===o?"selected":""}>${o}</option>`).join("")}</select></div>`;
  document.getElementById("modalHost").innerHTML = `
  <div class="modal-bg" onclick="if(event.target===this)closeEdit()">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-weight:900;font-size:17px">${cur.id?esc(cur.juris)+" · "+esc(cur.name):"새 가맹점 등록"}${cur.memX==="X"?' <span class="chip" style="background:#E5E7EB;color:#52525B">대상외 X</span>':""}</div>
        <button style="background:transparent;font-size:20px;color:var(--faint)" onclick="closeEdit()">✕</button>
      </div>
      <p class="ftit">가맹점 기본정보 (원본)</p><div class="fgrid">
        ${fi("업체코드","code","text",110)}${fs("관할","juris",JURIS,110)}${fi("거점명","name","text",150)}${fi("주소","addr")}${fi("대표자","owner","text",95)}${fi("전화번호","phone","text",135)}${fi("사업자번호","bizNo","text",125)}${fi("승상","vtype","text",90)}
      </div>
      <p class="ftit">회원사 관리 — X 선택 시 전환대상 제외 (행 삭제 대신 X 처리 권장)</p><div class="fgrid">
        ${fs("회원사 여부","memX",["X"],100)}${fi("원본 메모","memo","text",200)}
      </div>
      <p class="ftit">기존 회선</p><div class="fgrid">
        ${fs("기존 통신사","telco",["KT","LGU+","기타"],105)}${fi("기존 대표번호","oldNum","text",140)}${fi("약정 만료일","expiry","date",145)}${fs("위약금","penalty",["Y","N"],80)}
      </div>
      <p class="ftit">진행 관리</p><div class="fgrid">
        ${fs("진행상태","status",STATUSES,115)}${fi("상담일","consultD","date",143)}${fi("청약일","applyD","date",143)}${fi("개통예정일","planD","date",143)}${fi("개통완료일","openD","date",143)}
      </div>
      <p class="ftit" style="color:var(--mut)">상품 구성·회선 정보는 [📋 청약서 만들기]에서 회선 단위로 입력합니다 (중복 입력 방지)</p>
      <p class="ftit">담당자·설치</p><div class="fgrid">
        ${fi("영업담당자","salesMgr","text",120)}${fi("설치담당자","installMgr","text",120)}${fi("설치완료일","installD","date",143)}
      </div>
      <div style="margin-bottom:16px"><span class="lbl">비고</span><textarea data-k="note" rows="2" style="width:100%">${esc(cur.note)}</textarea></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        ${cur.id?`<button id="delBtn" style="background:#fff;border:1px solid #E86A6A;color:#A32626;padding:9px 16px;margin-right:auto" onclick="delStore()">삭제</button>`:""}
        ${cur.id?`<button class="btn-dark" style="padding:9px 16px" onclick="orderFromStore('${cur.id}')">📋 청약서 만들기</button>`:""}
        <button class="btn-line" style="padding:9px 18px" onclick="closeEdit()">취소</button>
        <button class="btn-red" style="padding:9px 22px" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>`;
}
function closeEdit(){ document.getElementById("modalHost").innerHTML=""; cur=null; }
function saveEdit(){
  document.querySelectorAll("#modalHost [data-k]").forEach(el=>cur[el.dataset.k]=el.value);
  if(!cur.name.trim()){ toast("거점명을 입력하세요"); return; }
  if(cur.memX==="X") cur.status="";
  else if(!cur.status) cur.status="미접촉";
  cur.updatedAt=now(); cur.updatedBy=uName();
  if(cur.id){ const i=DB.stores.findIndex(s=>s.id===cur.id); if(i>-1) DB.stores[i]=cur; else DB.stores.push(cur); }
  else { cur.id=uid(); DB.stores.push(cur); }
  if(cloud) saveStoreCloud(cur); else persist();
  closeEdit(); render(); toast("저장되었습니다"+(cloud?" — 팀원 화면에 반영됨":""));
}
let delOnce=false;
function delStore(){
  if(!delOnce){ delOnce=true; document.getElementById("delBtn").textContent="정말 삭제"; document.getElementById("delBtn").style.background="#A32626"; document.getElementById("delBtn").style.color="#fff"; setTimeout(()=>{delOnce=false;const b=document.getElementById("delBtn");if(b){b.textContent="삭제";b.style.background="#fff";b.style.color="#A32626";}},2500); return; }
  const _id=cur.id;
  DB.stores = DB.stores.filter(s=>s.id!==_id);
  if(cloud) delStoreCloud(_id); else persist();
  closeEdit(); render(); toast("삭제되었습니다 (이력 보존이 필요하면 삭제 대신 X 처리 권장)");
}
